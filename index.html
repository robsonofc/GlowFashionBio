<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRA | Moda Feminina</title>
    <meta name="description" content="LYRA - Moda Feminina. Streetwear Luxo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --text-main: #2C2A29;
            /* Dark charcoal/brown for text on light background */
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(105deg, 
                #FAF8F5 0%, 
                #EBE3D5 15%, 
                #FDFBF7 30%, 
                #FFFFFF 45%, 
                #EBE3D5 60%, 
                #FAF8F5 75%, 
                #EAE1D1 90%, 
                #FAF8F5 100%
            );
            background-size: 300% 100%;
            animation: silkCurtain 8s ease-in-out infinite alternate;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        @keyframes silkCurtain {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            /* Optimized for mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header / Logo */
        .header {
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-image {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.05);
        }

        .brand-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icon {
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(5px);
        }

        .social-icon:hover,
        .social-icon:active {
            background: rgba(0, 0, 0, 0.08);
            transform: translateY(-3px);
            border-color: rgba(0, 0, 0, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Buttons container */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: linear-gradient(145deg, #FFFFFF 0%, #FFFFFF 100%);
            /* Deep dark espresso/black */
            color: #000000;
            border-radius: var(--radius);
            padding: 18px 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            min-height: 85px;
            z-index: 1;
            opacity: 0;
            animation: fadeInUpStagger 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .link-card:nth-child(1) { animation-delay: 0.1s; }
        .link-card:nth-child(2) { animation-delay: 0.25s; }
        .link-card:nth-child(3) { animation-delay: 0.4s; }

        .ripple {
            position: absolute;
            background: rgba(128, 128, 128, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear forwards;
            pointer-events: none;
            width: 100px;
            height: 100px;
            margin-top: -50px;
            margin-left: -50px;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(6);
                opacity: 0;
            }
        }

        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .link-card:active {
            transform: scale(0.96);
        }

        .link-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            align-items: center;
            text-align: center;
        }

        .link-card.has-icon .link-content {
            align-items: flex-start;
            text-align: left;
            padding-left: 15px;
        }

        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            padding: 8px;
        }

        .link-icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .link-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .link-subtitle {
            font-weight: 400;
            font-size: 0.75rem;
            opacity: 0.75;
            line-height: 1.4;
        }

        /* Shine effect */
        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        @keyframes fadeInUpStagger {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(rgba(212, 175, 55, 0.4) 1px, transparent 1px),
                radial-gradient(rgba(212, 175, 55, 0.25) 1px, transparent 1px),
                radial-gradient(rgba(212, 175, 55, 0.15) 2px, transparent 2px);
            background-size: 60px 60px, 90px 90px, 130px 130px;
            background-position: 0 0, 40px 30px, 15px 80px;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 5s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
            100% { opacity: 0.4; transform: scale(1); }
        }
    </style>
</head>

    <script>
        document.querySelectorAll('.link-card').forEach(btn => {
            btn.addEventListener('click', function (e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);

                let rect = this.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;

                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
